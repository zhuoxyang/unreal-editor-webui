<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unreal Editor WebUI</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #101114;
        color: #f3f4f6;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(57, 117, 255, 0.22), transparent 34rem),
          #101114;
      }

      main {
        box-sizing: border-box;
        max-width: 880px;
        padding: 40px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 34px;
      }

      p {
        color: #c7ccd8;
        line-height: 1.6;
      }

      .panel {
        margin-top: 28px;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.28);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: #4f7cff;
        color: white;
        cursor: pointer;
        font-weight: 650;
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.12);
      }

      pre {
        min-height: 120px;
        overflow: auto;
        margin: 20px 0 0;
        padding: 16px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.36);
        color: #bfe3ff;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Unreal Editor WebUI</h1>
      <p>
        A minimal UE 5.5+ editor Web UI panel using SWebBrowser, a C++ UObject bridge,
        and the Python Editor Script Plugin.
      </p>

      <section class="panel">
        <strong>Bridge smoke test</strong>
        <p>
          In Unreal, bound C++ function names are exposed to JavaScript in lowercase under
          <code>window.ue.editorwebui</code>.
        </p>
        <div class="actions">
          <button id="send-message">Send JS message</button>
          <button id="project-info" class="secondary">Read project info</button>
          <button id="run-python" class="secondary">Run Python log</button>
        </div>
        <pre id="output">Waiting for Unreal bridge...</pre>
      </section>
    </main>

    <script>
      const output = document.querySelector("#output");

      function log(message) {
        const time = new Date().toLocaleTimeString();
        output.textContent += `\n[${time}] ${message}`;
      }

      function getBridge() {
        return window.ue && window.ue.editorwebui;
      }

      async function callBridge(methodName, ...args) {
        const bridge = getBridge();
        if (!bridge || typeof bridge[methodName] !== "function") {
          throw new Error(`Bridge method unavailable: ${methodName}`);
        }

        return await bridge[methodName](...args);
      }

      document.querySelector("#send-message").addEventListener("click", async () => {
        const payload = JSON.stringify({ type: "hello", source: "web", at: Date.now() });
        await callBridge("postmessage", payload);
        log(`Sent payload: ${payload}`);
      });

      document.querySelector("#project-info").addEventListener("click", async () => {
        const name = await callBridge("getprojectname");
        const dir = await callBridge("getprojectdir");
        log(`Project: ${name}`);
        log(`Dir: ${dir}`);
      });

      document.querySelector("#run-python").addEventListener("click", async () => {
        const code = "import unreal\\nunreal.log('Hello from Unreal Editor WebUI Python bridge')";
        const ok = await callBridge("executepython", code);
        log(`Python execution result: ${ok}`);
      });

      if (getBridge()) {
        output.textContent = "Unreal bridge is available.";
      } else {
        output.textContent = "Open this page inside the Unreal Editor WebUI tab to enable the bridge.";
      }
    </script>
  </body>
</html>

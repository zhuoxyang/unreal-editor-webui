name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate plugin and frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify packaged frontend entry point
        run: test -f Web/dist/index.html

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Validate plugin descriptor JSON
        run: python -m json.tool UnrealEditorWebUI.uplugin

      - name: Check Python syntax
        run: python -m py_compile Python/unreal_editor_webui_registry.py Python/unreal_editor_webui_demo.py

      - name: Check Unix packaging script syntax
        run: bash -n scripts/package-plugin.sh

      - name: Run Python registry tests
        run: python -m unittest discover -s tests

      - name: Check whitespace
        run: git diff --check
